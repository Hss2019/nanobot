<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nanobot</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
:root {
  --bg: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-msg-user: #0f3460;
  --bg-msg-bot: #252545;
  --text: #e4e4e4;
  --text-muted: #8888aa;
  --accent: #e94560;
  --accent-hover: #ff6b81;
  --border: #2a2a4a;
  --input-bg: #1f1f3a;
  --success: #4ecca3;
  --shadow: rgba(0,0,0,0.3);
}
[data-theme="light"] {
  --bg: #f5f5f5;
  --bg-secondary: #ffffff;
  --bg-msg-user: #dcefff;
  --bg-msg-bot: #f0f0f0;
  --text: #333;
  --text-muted: #888;
  --accent: #e94560;
  --accent-hover: #d63851;
  --border: #ddd;
  --input-bg: #fff;
  --success: #27ae60;
  --shadow: rgba(0,0,0,0.1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* Header */
.header { display:flex; align-items:center; justify-content:space-between; padding:8px 16px; background:var(--bg-secondary); border-bottom:1px solid var(--border); flex-shrink:0; }
.header-left { display:flex; align-items:center; gap:10px; }
.logo { font-size:18px; font-weight:700; }
.status-dot { width:8px; height:8px; border-radius:50%; background:#888; display:inline-block; }
.status-dot.connected { background:var(--success); }
.model-name { font-size:13px; color:var(--text-muted); }
.header-actions { display:flex; gap:8px; }
.header-actions button { background:none; border:1px solid var(--border); color:var(--text); padding:4px 10px; border-radius:6px; cursor:pointer; font-size:13px; }
.header-actions button:hover { border-color:var(--accent); color:var(--accent); }

/* Messages */
.messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
.msg { max-width:80%; padding:10px 14px; border-radius:12px; line-height:1.6; font-size:14px; word-wrap:break-word; }
.msg.user { align-self:flex-end; background:var(--bg-msg-user); border-bottom-right-radius:4px; }
.msg.bot { align-self:flex-start; background:var(--bg-msg-bot); border-bottom-left-radius:4px; }
.msg.bot pre { background:rgba(0,0,0,0.3); border-radius:6px; padding:10px; overflow-x:auto; margin:8px 0; }
.msg.bot code { font-size:13px; }
.msg.bot p { margin:4px 0; }
.msg.bot ul, .msg.bot ol { margin:4px 0 4px 20px; }
.msg.bot table { border-collapse:collapse; margin:8px 0; }
.msg.bot th, .msg.bot td { border:1px solid var(--border); padding:4px 8px; font-size:13px; }
.msg.progress { align-self:flex-start; color:var(--text-muted); font-size:13px; font-style:italic; background:transparent; padding:4px 14px; }
.msg.tool-hint { align-self:flex-start; color:var(--text-muted); font-size:12px; font-family:monospace; background:transparent; padding:2px 14px; }

/* Input */
.input-area { display:flex; gap:8px; padding:12px 16px; background:var(--bg-secondary); border-top:1px solid var(--border); flex-shrink:0; }
.input-area textarea { flex:1; background:var(--input-bg); border:1px solid var(--border); color:var(--text); padding:10px 14px; border-radius:10px; font-size:14px; font-family:inherit; resize:none; outline:none; max-height:120px; line-height:1.5; }
.input-area textarea:focus { border-color:var(--accent); }
.input-area button { background:var(--accent); color:#fff; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; font-size:14px; font-weight:600; flex-shrink:0; }
.input-area button:hover { background:var(--accent-hover); }
.input-area button:disabled { opacity:0.5; cursor:not-allowed; }

/* Settings panel */
.settings-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; }
.settings-overlay.open { display:flex; justify-content:flex-end; }
.settings-panel { width:380px; max-width:90vw; background:var(--bg-secondary); height:100%; overflow-y:auto; padding:24px; box-shadow:-4px 0 20px var(--shadow); }
.settings-panel h2 { font-size:18px; margin-bottom:16px; }
.settings-panel h3 { font-size:14px; color:var(--text-muted); margin:16px 0 8px; text-transform:uppercase; letter-spacing:1px; }
.field { margin-bottom:12px; }
.field label { display:block; font-size:13px; color:var(--text-muted); margin-bottom:4px; }
.field input, .field select { width:100%; background:var(--input-bg); border:1px solid var(--border); color:var(--text); padding:8px 10px; border-radius:6px; font-size:13px; outline:none; }
.field input:focus, .field select:focus { border-color:var(--accent); }
.save-btn { width:100%; background:var(--accent); color:#fff; border:none; padding:10px; border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; margin-top:16px; }
.save-btn:hover { background:var(--accent-hover); }
.save-msg { color:var(--success); font-size:13px; margin-top:8px; text-align:center; display:none; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <span class="logo">Nanobot</span>
    <span class="status-dot" id="statusDot"></span>
    <span class="model-name" id="modelName">--</span>
  </div>
  <div class="header-actions">
    <button onclick="sendCommand('/new')" title="New conversation">New</button>
    <button onclick="sendCommand('/stop')" title="Stop current task">Stop</button>
    <button onclick="toggleTheme()" id="themeBtn">Light</button>
    <button onclick="openSettings()">Settings</button>
  </div>
</div>

<!-- Messages -->
<div class="messages" id="messages">
  <div class="msg bot">Welcome! Configure your API key in Settings to get started.</div>
</div>

<!-- Input -->
<div class="input-area">
  <textarea id="input" rows="1" placeholder="Type a message... (Enter to send, Shift+Enter for newline)" autofocus></textarea>
  <button id="sendBtn" onclick="sendMessage()">Send</button>
</div>

<!-- Settings Overlay -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettingsOutside(event)">
  <div class="settings-panel" id="settingsPanel">
    <h2>Settings</h2>

    <h3>Model</h3>
    <div class="field">
      <label>Model name</label>
      <input id="cfgModel" placeholder="anthropic/claude-opus-4-5">
    </div>
    <div class="field">
      <label>Provider</label>
      <select id="cfgProvider">
        <option value="auto">auto (detect by model/key)</option>
        <option value="anthropic">Anthropic</option>
        <option value="openai">OpenAI</option>
        <option value="openrouter">OpenRouter</option>
        <option value="deepseek">DeepSeek</option>
        <option value="gemini">Gemini</option>
        <option value="dashscope">DashScope</option>
        <option value="zhipu">Zhipu</option>
        <option value="moonshot">Moonshot</option>
        <option value="aihubmix">AiHubMix</option>
        <option value="siliconflow">SiliconFlow</option>
        <option value="volcengine">VolcEngine</option>
        <option value="groq">Groq</option>
        <option value="ollama">Ollama</option>
        <option value="vllm">vLLM</option>
        <option value="custom">Custom</option>
      </select>
    </div>
    <div class="field">
      <label>Temperature</label>
      <input id="cfgTemp" type="number" step="0.1" min="0" max="2" value="0.1">
    </div>
    <div class="field">
      <label>Max tokens</label>
      <input id="cfgMaxTokens" type="number" value="8192">
    </div>

    <h3>API Keys</h3>
    <div class="field">
      <label>Anthropic API key</label>
      <input id="keyAnthropic" type="password" placeholder="sk-ant-...">
    </div>
    <div class="field">
      <label>OpenAI API key</label>
      <input id="keyOpenai" type="password" placeholder="sk-...">
    </div>
    <div class="field">
      <label>OpenRouter API key</label>
      <input id="keyOpenrouter" type="password" placeholder="sk-or-...">
    </div>
    <div class="field">
      <label>DeepSeek API key</label>
      <input id="keyDeepseek" type="password" placeholder="">
    </div>
    <div class="field">
      <label>Custom API base</label>
      <input id="baseCustom" type="text" placeholder="https://your-endpoint/v1">
    </div>
    <div class="field">
      <label>Custom API key</label>
      <input id="keyCustom" type="password" placeholder="">
    </div>

    <button class="save-btn" onclick="saveSettings()">Save Settings</button>
    <div class="save-msg" id="saveMsg">Settings saved! Restart to apply.</div>
  </div>
</div>

<script>
marked.setOptions({
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, {language: lang}).value;
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
});

let ws = null;
let chatId = localStorage.getItem('nanobot_chat_id') || null;
let isWaiting = false;
let reconnectDelay = 1000;
let progressEl = null;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('statusDot').classList.add('connected');
    reconnectDelay = 1000;
  };

  ws.onclose = () => {
    document.getElementById('statusDot').classList.remove('connected');
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 10000);
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    handleMessage(data);
  };
}

function handleMessage(data) {
  const container = document.getElementById('messages');

  if (data.type === 'connected') {
    chatId = data.chat_id;
    localStorage.setItem('nanobot_chat_id', chatId);
    if (data.model) document.getElementById('modelName').textContent = data.model;
    return;
  }

  if (data.type === 'progress') {
    if (!progressEl) {
      progressEl = document.createElement('div');
      progressEl.className = 'msg progress';
      container.appendChild(progressEl);
    }
    progressEl.textContent = data.content || 'Thinking...';
    scrollToBottom();
    return;
  }

  if (data.type === 'tool_hint') {
    const el = document.createElement('div');
    el.className = 'msg tool-hint';
    el.textContent = data.content;
    container.appendChild(el);
    scrollToBottom();
    return;
  }

  if (data.type === 'response') {
    // Remove progress indicator
    if (progressEl) { progressEl.remove(); progressEl = null; }

    const el = document.createElement('div');
    el.className = 'msg bot';
    el.innerHTML = marked.parse(data.content || '(empty response)');
    container.appendChild(el);
    scrollToBottom();
    isWaiting = false;
    updateSendBtn();
  }
}

function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

  // Display user message
  const container = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg user';
  el.textContent = text;
  container.appendChild(el);
  scrollToBottom();

  ws.send(JSON.stringify({type: 'message', content: text}));
  input.value = '';
  autoResize(input);
  isWaiting = true;
  updateSendBtn();
}

function sendCommand(cmd) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({type: 'command', content: cmd}));
  if (cmd === '/new') {
    document.getElementById('messages').innerHTML = '<div class="msg bot">New conversation started.</div>';
    if (progressEl) { progressEl = null; }
  }
}

function updateSendBtn() {
  document.getElementById('sendBtn').disabled = isWaiting;
}

function scrollToBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

// Textarea auto-resize + keyboard shortcuts
const input = document.getElementById('input');
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
input.addEventListener('input', () => autoResize(input));

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// Theme
function toggleTheme() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  document.documentElement.setAttribute('data-theme', isLight ? '' : 'light');
  document.getElementById('themeBtn').textContent = isLight ? 'Light' : 'Dark';
  localStorage.setItem('nanobot_theme', isLight ? 'dark' : 'light');
}
(function initTheme() {
  const saved = localStorage.getItem('nanobot_theme');
  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.getElementById('themeBtn').textContent = 'Dark';
  }
})();

// Settings
function openSettings() {
  document.getElementById('settingsOverlay').classList.add('open');
  loadSettings();
}
function closeSettingsOutside(e) {
  if (e.target === document.getElementById('settingsOverlay'))
    document.getElementById('settingsOverlay').classList.remove('open');
}

async function loadSettings() {
  try {
    const r = await fetch('/api/config');
    const cfg = await r.json();
    const a = cfg.agents?.defaults || {};
    document.getElementById('cfgModel').value = a.model || '';
    document.getElementById('cfgProvider').value = a.provider || 'auto';
    document.getElementById('cfgTemp').value = a.temperature ?? 0.1;
    document.getElementById('cfgMaxTokens').value = a.maxTokens ?? 8192;

    const p = cfg.providers || {};
    document.getElementById('keyAnthropic').value = p.anthropic?.apiKey || '';
    document.getElementById('keyOpenai').value = p.openai?.apiKey || '';
    document.getElementById('keyOpenrouter').value = p.openrouter?.apiKey || '';
    document.getElementById('keyDeepseek').value = p.deepseek?.apiKey || '';
    document.getElementById('baseCustom').value = p.custom?.apiBase || '';
    document.getElementById('keyCustom').value = p.custom?.apiKey || '';
  } catch(e) { console.error('Failed to load config', e); }
}

async function saveSettings() {
  const payload = {
    agents: { defaults: {
      model: document.getElementById('cfgModel').value,
      provider: document.getElementById('cfgProvider').value,
      temperature: parseFloat(document.getElementById('cfgTemp').value),
      maxTokens: parseInt(document.getElementById('cfgMaxTokens').value),
    }},
    providers: {}
  };

  // Only send non-empty, non-masked keys
  const keyFields = [
    ['anthropic', 'keyAnthropic', 'apiKey'],
    ['openai', 'keyOpenai', 'apiKey'],
    ['openrouter', 'keyOpenrouter', 'apiKey'],
    ['deepseek', 'keyDeepseek', 'apiKey'],
    ['custom', 'keyCustom', 'apiKey'],
  ];
  for (const [prov, fieldId, prop] of keyFields) {
    const val = document.getElementById(fieldId).value;
    if (val && !val.includes('***')) {
      if (!payload.providers[prov]) payload.providers[prov] = {};
      payload.providers[prov][prop] = val;
    }
  }
  const customBase = document.getElementById('baseCustom').value;
  if (customBase && !customBase.includes('***')) {
    if (!payload.providers.custom) payload.providers.custom = {};
    payload.providers.custom.apiBase = customBase;
  }

  try {
    await fetch('/api/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
    const msg = document.getElementById('saveMsg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 3000);
  } catch(e) { alert('Failed to save: ' + e.message); }
}

// Connect on load
connect();
</script>
</body>
</html>
